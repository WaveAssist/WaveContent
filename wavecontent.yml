output_blocks:
  - key: "BASIC_ANALYSIS"
    markdown: |
      **WaveContent Report**

      **Executive Summary**
      Your website shows strong primary page structure but has opportunities in SEO optimization and content gaps. Top 3 opportunities: improve meta descriptions, add structured data, and expand long-form content.

      **Primary Page Recommendations**
      - Homepage: Add clear value proposition, improve H1 structure
      - About: Enhance storytelling, add team section
      - Product: Include more technical details and use cases

      **SEO & Discoverability**
      - Missing meta descriptions on 8 pages
      - No structured data detected
      - LLM readability: Good (85/100)

      **Content Recommendations**
      - Long-form: "Complete Guide to [Topic]" (2,500+ words)
      - Short-form: "5 Quick Tips for [Topic]" blog series
  - key: "WITH_COMPETITORS"
    markdown: |
      **WaveContent Report**

      **Executive Summary**
      Your content strategy is solid but competitors are publishing 3x more long-form content. Key gaps: missing comparison guides and case studies. Top opportunities: competitor content analysis reveals trending topics you're missing.

      **Competitor Analysis**
      - Competitor 1: Publishing 12 articles/month, strong in technical content
      - Competitor 2: Focus on video + blog, high engagement on tutorials
      - Content trends: Comparison guides, case studies, and "how-to" content performing well

      **Content Gaps**
      - Missing: Product comparison guides
      - Missing: Customer success stories
      - Missing: Industry trend analysis
  - key: "FULL_ANALYSIS"
    markdown: |
      **WaveContent Report**

      **Executive Summary**
      Comprehensive analysis reveals strong foundation with clear improvement areas. Competitors are ahead in content volume and social engagement. Top opportunities: expand content calendar, improve Twitter engagement, and optimize for featured snippets.

      **Twitter Insights**
      - Engagement rate: 2.3% (industry avg: 3.1%)
      - Top performing content: Product updates and tips
      - Recommendations: Increase educational content, engage with community questions

      **People Also Ask Opportunities**
      - "How does [product] compare to [competitor]?" (High search volume)
      - "What are the best practices for [use case]?" (Featured snippet opportunity)
      - Reddit questions: 15+ unanswered questions in your niche

