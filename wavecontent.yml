faqs:
  - q: "What exactly do I get?"
    a: "A comprehensive email report with executive summary, primary page recommendations, SEO analysis, content recommendations, competitor analysis, People Also Ask opportunities, and optional Twitter insights. The report is also attached as a PDF."
  - q: "How many pages does it analyze?"
    a: "WaveContent crawls up to 50 pages from your website, automatically segments them by type (primary/blog/product/docs/legal), and provides detailed analysis for up to 5 primary pages."
  - q: "What if I don't provide competitors?"
    a: "WaveContent will automatically discover up to 5 competitors via web search based on your website's industry and content."
  - q: "How accurate is the SEO analysis?"
    a: "The analysis checks meta descriptions, structured data, technical SEO elements, and LLM readability. It provides actionable recommendations based on current SEO best practices."
  - q: "Can I schedule regular analysis?"
    a: "Yes, you can schedule WaveContent to run weekly, monthly, or on-demand to track your content strategy improvements over time."
  - q: "How much does it cost?"
    a: "It's free to start with $2 credits included. You only pay once credits expire - it's a pay-as-you-go model based on usage."
